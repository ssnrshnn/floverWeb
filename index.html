<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flores</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #000806;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<script>
(() => {
  'use strict';

  const canvas = document.getElementById('scene');
  const ctx = canvas.getContext('2d');
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let W = 0, H = 0, dpr = 1;

  // ---------- utilities ----------
  const rand = (a, b) => a + Math.random() * (b - a);
  const randInt = (a, b) => Math.floor(rand(a, b + 1));
  const clamp01 = v => Math.min(1, Math.max(0, v));
  const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
  const easeOutBack = t => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  };

  // global wind: slow breeze plus occasional gusts, shared by everything
  function windAt(t) {
    const base = Math.sin(t * 0.35) * 0.4 + Math.sin(t * 0.13 + 2.1) * 0.3;
    const gust = Math.pow(Math.max(0, Math.sin(t * 0.08 + 1.3)), 3) * 1.2;
    return base + gust;
  }

  // ---------- timeline (ms) ----------
  const T_GRASS = [0, 2600];      // grass + ferns grow
  const T_STEMS = [900, 3600];    // flower stems rise
  const T_BLOOM = [3400, 5000];   // petals open
  const T_SPARK = 4600;           // sparkles fade in

  // ---------- scene state ----------
  let dots = [];        // faint background star-dots
  let grasses = [];
  let ferns = [];
  let flowers = [];
  let sparkles = [];
  let pollen = [];
  let fallingPetals = [];
  let shootingStars = [];
  let nextPetalDrop = 0;
  let nextShoot = 8;
  let startTime = 0;
  let lastNow = 0;

  function progressIn(elapsed, [a, b], stagger = 0) {
    if (reducedMotion) return 1;
    return clamp01((elapsed - a - stagger) / (b - a));
  }

  // ---------- builders ----------
  function makeDots() {
    dots = [];
    const count = Math.floor((W * H) / 6500);
    for (let i = 0; i < count; i++) {
      dots.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: rand(0.5, 1.1),
        green: Math.random() < 0.6,
        phase: rand(0, Math.PI * 2),
        speed: rand(0.3, 1.0),
      });
    }
  }

  function makeGrassCluster(cx, baseY, count, hMin, hMax, spread) {
    const blades = [];
    for (let i = 0; i < count; i++) {
      blades.push({
        x: cx + rand(-spread, spread),
        baseY,
        h: rand(hMin, hMax),
        bend: rand(-0.45, 0.45),        // sideways curve factor
        w: rand(3, 7),
        light: rand(18, 34),            // HSL lightness of tip
        stagger: rand(0, 900),
        swayPhase: rand(0, Math.PI * 2),
      });
    }
    return blades;
  }

  function makeFern(x, baseY, len, dir, stagger) {
    const leaflets = randInt(8, 12);
    return { x, baseY, len, dir, leaflets, stagger, swayPhase: rand(0, Math.PI * 2) };
  }

  function makeFlower(x, baseY, stemH, lean, headScale, stagger) {
    const leaves = [];
    const leafCount = randInt(3, 5);
    for (let l = 0; l < leafCount; l++) {
      leaves.push({
        at: 0.22 + 0.6 * (l / leafCount) + rand(-0.04, 0.04),
        side: l % 2 === 0 ? -1 : 1,
        len: stemH * rand(0.16, 0.24),
        angle: rand(0.6, 0.95),
      });
    }
    return {
      x, baseY, stemH, lean,
      headR: stemH * 0.16 * headScale,
      petalCount: 5,
      leaves,
      stagger,
      swayPhase: rand(0, Math.PI * 2),
      swaySpeed: rand(0.35, 0.55),
      glowPhase: rand(0, Math.PI * 2),
    };
  }

  function makeSparkles() {
    sparkles = [];
    for (const f of flowers) {
      const n = randInt(6, 9);
      for (let i = 0; i < n; i++) {
        sparkles.push({
          flower: f,
          angle: rand(0, Math.PI * 2),
          dist: f.headR * rand(1.2, 3.2),
          riseSpeed: rand(4, 14),        // px per second upward drift
          r: rand(1.2, 2.8),
          phase: rand(0, Math.PI * 2),
          blink: rand(1.0, 2.4),
          cycle: rand(5, 9),             // seconds before respawn
          offset: rand(0, 9),
        });
      }
    }
  }

  function buildScene() {
    makeDots();
    const baseY = H * 0.97;
    const cx = W / 2;
    const s = Math.min(W, H);           // scale unit

    // three flowers: tall center, two flanking — like a small bouquet
    flowers = [
      makeFlower(cx - s * 0.10, baseY, s * rand(0.36, 0.42), -0.10, 0.95, 600),
      makeFlower(cx + s * 0.002, baseY, s * rand(0.50, 0.56),  0.015, 1.1, 0),
      makeFlower(cx + s * 0.10, baseY, s * rand(0.40, 0.46),  0.12, 1.0, 300),
    ];

    grasses = [
      ...makeGrassCluster(cx - s * 0.30, baseY, randInt(7, 10), s * 0.18, s * 0.42, s * 0.10),
      ...makeGrassCluster(cx + s * 0.30, baseY, randInt(7, 10), s * 0.18, s * 0.42, s * 0.10),
      ...makeGrassCluster(cx,            baseY, randInt(8, 12), s * 0.10, s * 0.26, s * 0.16),
    ];

    ferns = [
      makeFern(cx - s * 0.16, baseY, s * 0.26, -1, 300),
      makeFern(cx + s * 0.14, baseY, s * 0.24,  1, 500),
      makeFern(cx - s * 0.03, baseY, s * 0.18, -1, 700),
    ];

    makeSparkles();
    makePollen();
    fallingPetals = [];
    shootingStars = [];
  }

  function makePollen() {
    pollen = [];
    const count = Math.max(10, Math.floor(W / 90));
    for (let i = 0; i < count; i++) {
      pollen.push({
        x: Math.random() * W,
        y: rand(H * 0.25, H * 0.95),
        drift: rand(-6, 6),
        vy: rand(-3, 3),
        r: rand(0.8, 1.8),
        phase: rand(0, Math.PI * 2),
        blink: rand(0.5, 1.4),
      });
    }
  }

  // ---------- drawing ----------
  function drawBackground() {
    const g = ctx.createRadialGradient(W / 2, H * 0.62, 0, W / 2, H * 0.62, Math.max(W, H) * 0.75);
    g.addColorStop(0, '#0c1a10');
    g.addColorStop(0.55, '#050d08');
    g.addColorStop(1, '#010402');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function drawDots(t) {
    for (const d of dots) {
      const tw = reducedMotion ? 0.5 : 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * d.speed + d.phase));
      ctx.globalAlpha = 0.22 * tw;
      ctx.fillStyle = d.green ? '#7fdf9f' : '#cfe8d8';
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawGrassBlade(b, t, elapsed, dim) {
    const p = easeOutCubic(progressIn(elapsed, T_GRASS, b.stagger));
    if (p <= 0.01) return;
    const sway = reducedMotion ? 0
      : Math.sin(t * 0.5 + b.swayPhase) * 0.02 + windAt(t) * 0.07;
    const h = b.h * p;
    const bend = (b.bend + sway) * h;
    const tipX = b.x + bend;
    const tipY = b.baseY - h;
    const cX = b.x + bend * 0.25;
    const cY = b.baseY - h * 0.55;

    const g = ctx.createLinearGradient(b.x, b.baseY, tipX, tipY);
    g.addColorStop(0, `hsl(140, 60%, ${Math.max(6, b.light - 16)}%)`);
    g.addColorStop(1, `hsl(130, 65%, ${b.light}%)`);
    ctx.fillStyle = g;
    ctx.globalAlpha = dim ? 0.55 : 1;
    ctx.beginPath();
    ctx.moveTo(b.x - b.w / 2, b.baseY);
    ctx.quadraticCurveTo(cX - b.w * 0.2, cY, tipX, tipY);
    ctx.quadraticCurveTo(cX + b.w * 0.2, cY, b.x + b.w / 2, b.baseY);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function drawFern(fern, t, elapsed) {
    const p = easeOutCubic(progressIn(elapsed, T_GRASS, fern.stagger));
    if (p <= 0.01) return;
    const sway = reducedMotion ? 0
      : Math.sin(t * 0.45 + fern.swayPhase) * 0.015 + windAt(t) * 0.03;
    const len = fern.len * p;
    const dir = fern.dir;
    // arched stem
    const tipX = fern.x + dir * len * (0.55 + sway);
    const tipY = fern.baseY - len * 0.8;
    const cX = fern.x + dir * len * 0.1;
    const cY = fern.baseY - len * 0.65;

    ctx.strokeStyle = 'hsl(140, 55%, 16%)';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(fern.x, fern.baseY);
    ctx.quadraticCurveTo(cX, cY, tipX, tipY);
    ctx.stroke();

    // leaflets along the arc, growing outward
    for (let i = 1; i <= fern.leaflets; i++) {
      const u = i / fern.leaflets;
      if (u > p) break;
      const a = 1 - u;
      const lx = a * a * fern.x + 2 * a * u * cX + u * u * tipX;
      const ly = a * a * fern.baseY + 2 * a * u * cY + u * u * tipY;
      const ll = fern.len * 0.16 * (1 - u * 0.65);
      for (const side of [-1, 1]) {
        ctx.save();
        ctx.translate(lx, ly);
        ctx.rotate(side * 1.15 + dir * 0.45 * u - Math.PI / 2);
        const lg = ctx.createLinearGradient(0, 0, ll, 0);
        lg.addColorStop(0, 'hsl(140, 60%, 14%)');
        lg.addColorStop(1, 'hsl(130, 65%, 30%)');
        ctx.fillStyle = lg;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(ll * 0.5, -ll * 0.32, ll, 0);
        ctx.quadraticCurveTo(ll * 0.5, ll * 0.32, 0, 0);
        ctx.fill();
        ctx.restore();
      }
    }
  }

  function stemPoint(f, sway, u) {
    const hx = f.x + f.lean * f.stemH + sway;
    const hy = f.baseY - f.stemH;
    const cx = f.x + f.lean * f.stemH * 0.25 + sway * 0.3;
    const cy = f.baseY - f.stemH * 0.55;
    const a = 1 - u;
    return {
      x: a * a * f.x + 2 * a * u * cx + u * u * hx,
      y: a * a * f.baseY + 2 * a * u * cy + u * u * hy,
    };
  }

  function drawLeaf(f, leaf, sway, scale, t) {
    if (scale <= 0.01) return;
    const p = stemPoint(f, sway, leaf.at);
    const len = leaf.len * scale;
    const flutter = reducedMotion ? 0
      : Math.sin(t * 2.6 + leaf.at * 9) * 0.05 * (0.6 + Math.abs(windAt(t)));
    ctx.save();
    ctx.translate(p.x, p.y);
    // leaves point upward-outward like the reference
    ctx.rotate(leaf.side * leaf.angle - Math.PI / 2 + flutter);
    const lg = ctx.createLinearGradient(0, 0, len, 0);
    lg.addColorStop(0, 'hsl(140, 60%, 15%)');
    lg.addColorStop(1, 'hsl(128, 70%, 34%)');
    ctx.fillStyle = lg;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(len * 0.55, -len * 0.42, len, 0);
    ctx.quadraticCurveTo(len * 0.55, len * 0.42, 0, 0);
    ctx.fill();
    ctx.restore();
  }

  function drawPetal(len, width) {
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-width * 0.6, -len * 0.3, -width * 0.72, -len * 1.05, 0, -len);
    ctx.bezierCurveTo(width * 0.72, -len * 1.05, width * 0.6, -len * 0.3, 0, 0);
    ctx.fill();
  }

  function drawFlower(f, t, elapsed) {
    const stemP = easeOutCubic(progressIn(elapsed, T_STEMS, f.stagger));
    if (stemP <= 0.01) return;
    const bloomP = progressIn(elapsed, T_BLOOM, f.stagger);

    const swayAmp = reducedMotion ? 0 : f.stemH * 0.028;
    const windPush = reducedMotion ? 0 : windAt(t) * f.stemH * 0.014;
    const sway = (Math.sin(t * f.swaySpeed + f.swayPhase) * swayAmp + windPush) * stemP;

    // stem
    const sg = ctx.createLinearGradient(f.x, f.baseY, f.x, f.baseY - f.stemH);
    sg.addColorStop(0, 'hsl(140, 55%, 13%)');
    sg.addColorStop(1, 'hsl(130, 60%, 28%)');
    ctx.strokeStyle = sg;
    ctx.lineWidth = Math.max(3, f.stemH * 0.018);
    ctx.lineCap = 'round';
    ctx.beginPath();
    const steps = 24;
    for (let i = 0; i <= steps * stemP; i++) {
      const p = stemPoint(f, sway, i / steps);
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();

    // leaves unfurl as the stem passes them
    for (const leaf of f.leaves) {
      const ls = clamp01((stemP - leaf.at) / 0.22);
      drawLeaf(f, leaf, sway, easeOutCubic(ls), t);
    }

    const head = stemPoint(f, sway, stemP);

    if (bloomP <= 0) {
      // bud
      if (stemP > 0.85) {
        ctx.fillStyle = 'hsl(95, 60%, 35%)';
        ctx.beginPath();
        ctx.arc(head.x, head.y, f.headR * 0.28, 0, Math.PI * 2);
        ctx.fill();
      }
      return;
    }

    const open = easeOutBack(bloomP);
    const glowPulse = bloomP >= 1 && !reducedMotion
      ? 0.8 + 0.2 * Math.sin(t * 1.1 + f.glowPhase)
      : bloomP;

    // glow halo behind the head
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const haloR = f.headR * (2.7 + 0.7 * glowPulse);   // halo breathes with the glow
    const halo = ctx.createRadialGradient(head.x, head.y, 0, head.x, head.y, haloR);
    halo.addColorStop(0, `rgba(255, 224, 64, ${0.30 * glowPulse})`);
    halo.addColorStop(0.5, `rgba(255, 200, 30, ${0.10 * glowPulse})`);
    halo.addColorStop(1, 'rgba(255, 200, 30, 0)');
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.arc(head.x, head.y, haloR, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // petals — fat rounded yellow petals
    const petalLen = f.headR * 1.35 * Math.max(0.05, open);
    const petalW = petalLen * 0.78;
    for (let i = 0; i < f.petalCount; i++) {
      const ang = (i / f.petalCount) * Math.PI * 2 - Math.PI / 2 + (1 - bloomP) * 0.5;
      ctx.save();
      ctx.translate(head.x, head.y);
      ctx.rotate(ang + Math.PI / 2);
      const pg = ctx.createLinearGradient(0, 0, 0, -petalLen);
      pg.addColorStop(0, '#e8b400');
      pg.addColorStop(0.55, '#ffd400');
      pg.addColorStop(1, '#ffef86');
      ctx.fillStyle = pg;
      drawPetal(petalLen, petalW);
      ctx.restore();
    }

    // core: white ring + golden heart, like the reference
    const coreR = f.headR * 0.42 * Math.min(1, open);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.92)';
    ctx.beginPath();
    ctx.ellipse(head.x, head.y + coreR * 0.15, coreR, coreR * 0.62, 0, 0, Math.PI * 2);
    ctx.fill();
    const cg = ctx.createRadialGradient(
      head.x, head.y - coreR * 0.1, 0,
      head.x, head.y, coreR * 0.85
    );
    cg.addColorStop(0, '#ffe97a');
    cg.addColorStop(1, '#d99a00');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(head.x, head.y, coreR * 0.78, coreR * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawSparkles(t, elapsed) {
    if (reducedMotion) return;
    const appear = clamp01((elapsed - T_SPARK) / 1800);
    if (appear <= 0) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const sp of sparkles) {
      const f = sp.flower;
      const head = stemPoint(f, 0, 1);
      const cycleT = ((t + sp.offset) % sp.cycle) / sp.cycle;   // 0..1 then respawn
      const x = head.x + Math.cos(sp.angle + t * 0.3 + sp.phase) * sp.dist;
      const y = head.y + Math.sin(sp.angle * 1.7 + sp.phase) * sp.dist * 0.5
                - cycleT * sp.riseSpeed * sp.cycle;
      const fade = Math.sin(cycleT * Math.PI);                  // in and out over cycle
      const blink = 0.5 + 0.5 * Math.sin(t * sp.blink * 3 + sp.phase);
      const a = appear * fade * (0.35 + 0.65 * blink);
      const g = ctx.createRadialGradient(x, y, 0, x, y, sp.r * 5);
      g.addColorStop(0, `rgba(255, 236, 130, ${0.95 * a})`);
      g.addColorStop(0.35, `rgba(255, 220, 80, ${0.35 * a})`);
      g.addColorStop(1, 'rgba(255, 220, 80, 0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, sp.r * 5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function updateAndDrawPollen(t, dt, elapsed) {
    if (reducedMotion) return;
    const appear = clamp01((elapsed - T_SPARK) / 2500);
    if (appear <= 0) return;
    const wind = windAt(t);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const m of pollen) {
      m.x += (wind * 18 + m.drift) * dt;
      m.y += (m.vy + Math.sin(t * 0.7 + m.phase) * 4) * dt;
      if (m.x < -10) m.x = W + 10;
      if (m.x > W + 10) m.x = -10;
      if (m.y < H * 0.15) m.y = H * 0.95;
      if (m.y > H) m.y = H * 0.2;
      const a = appear * (0.10 + 0.20 * (0.5 + 0.5 * Math.sin(t * m.blink + m.phase)));
      const g = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.r * 4);
      g.addColorStop(0, `rgba(240, 255, 180, ${a})`);
      g.addColorStop(1, 'rgba(240, 255, 180, 0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(m.x, m.y, m.r * 4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function updateAndDrawFallingPetals(t, dt, elapsed) {
    if (reducedMotion) return;
    // occasionally a petal breaks loose from a bloomed flower and drifts down
    if (elapsed > T_BLOOM[1] + 1500 && t > nextPetalDrop) {
      const f = flowers[randInt(0, flowers.length - 1)];
      const head = stemPoint(f, 0, 1);
      fallingPetals.push({
        x: head.x + rand(-f.headR, f.headR),
        y: head.y + rand(-f.headR * 0.5, f.headR * 0.5),
        size: f.headR * rand(0.35, 0.5),
        rot: rand(0, Math.PI * 2),
        rotSpeed: rand(-1.5, 1.5),
        phase: rand(0, Math.PI * 2),
        life: 0,
        maxLife: rand(5, 8),
      });
      nextPetalDrop = t + rand(2, 5);
    }
    const wind = windAt(t);
    for (let i = fallingPetals.length - 1; i >= 0; i--) {
      const p = fallingPetals[i];
      p.life += dt;
      p.x += (wind * 28 + Math.sin(t * 1.6 + p.phase) * 14) * dt;
      p.y += (16 + Math.sin(t * 2.1 + p.phase) * 9) * dt;
      p.rot += p.rotSpeed * dt;
      if (p.life > p.maxLife || p.y > H) {
        fallingPetals.splice(i, 1);
        continue;
      }
      const a = Math.min(1, p.life * 2) * clamp01((p.maxLife - p.life) / 1.5) * 0.85;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = a;
      const g = ctx.createLinearGradient(0, p.size * 0.5, 0, -p.size * 0.5);
      g.addColorStop(0, '#e8b400');
      g.addColorStop(1, '#ffef86');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size * 0.55, p.size * 0.34, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      ctx.globalAlpha = 1;
    }
  }

  function updateAndDrawShootingStars(t, dt) {
    if (reducedMotion) return;
    if (t > nextShoot) {
      shootingStars.push({
        x: rand(W * 0.15, W * 0.85),
        y: rand(H * 0.05, H * 0.3),
        vx: rand(320, 520) * (Math.random() < 0.5 ? -1 : 1),
        vy: rand(70, 150),
        life: 0,
        maxLife: rand(0.7, 1.1),
      });
      nextShoot = t + rand(7, 15);
    }
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = shootingStars.length - 1; i >= 0; i--) {
      const s = shootingStars[i];
      s.life += dt;
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      if (s.life > s.maxLife) {
        shootingStars.splice(i, 1);
        continue;
      }
      const a = Math.sin((s.life / s.maxLife) * Math.PI) * 0.9;
      const tailX = s.x - s.vx * 0.16;
      const tailY = s.y - s.vy * 0.16;
      const g = ctx.createLinearGradient(s.x, s.y, tailX, tailY);
      g.addColorStop(0, `rgba(235, 250, 240, ${a})`);
      g.addColorStop(1, 'rgba(235, 250, 240, 0)');
      ctx.strokeStyle = g;
      ctx.lineWidth = 1.6;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(tailX, tailY);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ---------- main loop ----------
  function frame(now) {
    if (!startTime) startTime = now;
    const dt = Math.min(0.05, lastNow ? (now - lastNow) / 1000 : 0.016);
    lastNow = now;
    const elapsed = now - startTime;
    const t = now / 1000;

    drawBackground();
    drawDots(t);
    updateAndDrawShootingStars(t, dt);

    // back grass, dimmed for depth
    for (let i = 0; i < grasses.length; i++) {
      if (i % 2 === 0) drawGrassBlade(grasses[i], t, elapsed, true);
    }
    for (const fern of ferns) drawFern(fern, t, elapsed);
    for (const f of flowers) drawFlower(f, t, elapsed);
    // front grass over stems
    for (let i = 0; i < grasses.length; i++) {
      if (i % 2 === 1) drawGrassBlade(grasses[i], t, elapsed, false);
    }
    drawSparkles(t, elapsed);
    updateAndDrawPollen(t, dt, elapsed);
    updateAndDrawFallingPetals(t, dt, elapsed);

    if (!reducedMotion) requestAnimationFrame(frame);
  }

  function resize(regrow) {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    buildScene();
    if (regrow) {
      startTime = 0;
    } else {
      // after a resize, show the scene fully grown instead of replaying
      startTime = -1e9;
    }
    if (reducedMotion) {
      startTime = 1;
      frame(1e9); // single static fully-bloomed render
    }
  }

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => resize(false), 150);
  });

  resize(true);
  if (!reducedMotion) requestAnimationFrame(frame);
})();
</script>
</body>
</html>
